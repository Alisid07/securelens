<!DOCTYPE html>
<html>
<head>
  <title>SecureLens Dashboard</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 30px;
    }
    textarea {
      width: 100%;
      height: 200px;
      background: #1e293b;
      color: white;
      border: none;
      padding: 10px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #22c55e;
      border: none;
      cursor: pointer;
    }
    .result {
      margin-top: 20px;
      background: #1e293b;
      padding: 15px;
    }
  </style>
</head>
<body>

<h1>🔐 SecureLens</h1>

<textarea id="code" placeholder="Paste your code here..."></textarea>

<br>
<button onclick="scan()">Scan Code</button>

<div class="result" id="result"></div>

<script>
async function scan() {
  const code = document.getElementById("code").value;

  const res = await fetch("http://127.0.0.1:8000/scan", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      code: code,
      filename: "snippet.py",
      language: "python",
      use_llm: true
    })
  });

  const data = await res.json();

  document.getElementById("result").innerHTML =
    "<pre>" + JSON.stringify(data, null, 2) + "</pre>";
}
</script>

</body>
</html>
